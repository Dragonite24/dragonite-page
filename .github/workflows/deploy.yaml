name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Push built files to the gh-pages branch (classic GitHub Pages flow)
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build
        env:
          PUBLIC_SITE_EMAIL: ${{ secrets.PUBLIC_SITE_EMAIL }}
          PUBLIC_SITE_GITHUB: ${{ secrets.PUBLIC_SITE_GITHUB }}
          PUBLIC_SITE_TELEGRAM: ${{ secrets.PUBLIC_SITE_TELEGRAM }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
